name: "Table 2: Au+Au"
location: Data from table 2 of PhysRevC.83.024913
description: Summary of the midrapidity charged particle multiplicity $\left.\frac{dN_{ch}}{d\eta}\right|_{|\eta|<1}/\langle N_{part}/2\rangle$ for Au+Au for 0--6\% central collisions. The data are averaged over those obtained from the tracklet counting and single Si layer analysis. Errors represent averages of the 90% C.L. systematic errors for the two methods. Statistical errors are negligible.
