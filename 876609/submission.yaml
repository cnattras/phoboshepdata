name: "Table 7: $\\sqrt{s_{NN}}=19.6~GeV$"
location: Data from table 7 of PhysRevC.83.024913
description: Summary of the total charged-particle multiplicity estimates for Au+Au collisions obtained in three different ways. $N_{ch}\, (|\eta|<5.4)$ denotes the multiplicity observed within the acceptance region $|\eta|<5.4$ obtained from the single-layer analysis, whereas $N_{ch}^{tot}$ and $N_{ch}^{p}$ represent extrapolations into the unmeasured $\eta$ region, either including or excluding contributions from spectator emission. The data are listed as a function of centrality expressed as a percentage of the total reaction cross section for $\sqrt{s_{NN}}=19.6~GeV$. Also listed are the full width at half maximum, FWHM, of the $dN/d\eta$ distributions and the derived quantity $N_{part}$. Only systematic errors at 90% C.L. are given since statistical errors are negligible.
