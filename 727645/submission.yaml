- { location: "https://doi.org/10.1103/PhysRevC.94.024903", description: "PhysRevC.94.024903" }
comment: |
  Spectator fragments resulting from relativistic heavy ion collisions, consisting of single protons and neutrons along with groups of stable nuclear fragments up to Nitrogen ($Z$\,=\,7), are measured in PHOBOS. These fragments are observed in Au+Au ($\sqrt{S_{NN}}=19.6~GeV$) and Cu+Cu ($\sqrt{S_{NN}}=22.4~GeV$) collisions at high pseudorapidity ($\eta$). The dominant multiply-charged fragment is the tightly bound Helium ($\alpha$), with Lithium, Beryllium, and Boron all clearly seen as a function of collision centrality and pseudorapidity. We observe that in Cu+Cu collisions, it becomes much more favorable for the $\alpha$ fragments to be released than Lithium. The yields of fragments approximately scale with the number of spectator nucleons, independent of the colliding ion. The shapes of the pseudorapidity distributions of fragments indicate that the average deflection of the fragments away from the beam direction increases for more central collisions. A detailed comparison of the shapes for $\alpha$ and Lithium fragments indicates that the centrality dependence of the deflections favors a scaling with the number of participants in the collision.
---
