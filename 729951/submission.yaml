comment: |
  BNL-RHIC. Antiparticle-to-particle ratios for identified protons, kaons, and pions in Cu+Cu collisions at $\sqrt{s_{NN}} = 62.4$ GeV are presented as a function of centrality in the midrapidity region $0.2 < \eta < 1.4$. No strong dependence on centrality is observed. For the $\langle \overline{p} \rangle / \langle p \rangle$ ratio at $\langle p_T \rangle \approx 0.51$ GeV/$c$, an average value of $0.50 \pm 0.003_{stat} \pm 0.04_{syst}$ is observed for the 10% most central 62.4 GeV Cu+Cu collisions, while a value of $0.77 \pm 0.008_{stat} \pm 0.05_{syst}$ is observed for the 10% most central 200 GeV Cu+Cu collisions. The values for all three particle species measured at $\sqrt{s_{NN}} = 62.4$ and 200 GeV are consistent, within systematic uncertainties, with those observed in both heavier and lighter systems at the same RHIC energies. This indicates that system size does not appear to play a strong role in determining the midrapidity chemical freeze-out properties that affect the antiparticle-to-particle ratios of the three most abundant particle species produced in these collisions.
---
