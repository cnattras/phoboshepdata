#PHOBOS PAPER
#TITLE: Centrality and pseudorapidity dependence of elliptic flow for charged hadrons in Au+Au collisions at sqrt(s_NN)= 200 GeV
#InspireHEP ID: 654475
#
#Prepared by Eleanna Soto

additional_resources:
# additional references (e.g. experiment TWiki page for analysis)
- { location: "https://inspirehep.net/literature/654475", description: "InspireHEP ID: 654475" }
- { location: "https://arxiv.org/abs/nucl-ex/0407012", description: "arXiv ID: nucl-ex/0407012" }
- { location: "https://link.aps.org/doi/10.1103/PhysRevC.72.051901", description: "Phys. Rev. C72, 051901(R) (2005)" }
comment: |
  This paper describes the measurement of elliptic flow for charged particles in Au+Au collisions at $\sqrt{s_{NN}}$ =200 GeV using the PHOBOS detector at the Relativistic Heavy Ion Collider (RHIC). The measured azimuthal anisotropy is presented over a wide range of pseudorapidity for three broad collision centrality classes for the first time at this energy. Two distinct methods of extracting the flow signal were used in order to reduce systematic uncertainties. The elliptic flow falls sharply with increasing eta at 200 GeV for all the centralities studied, as observed for minimum-bias collisions at $\sqrt{s_{NN}}$ =130 GeV. 
