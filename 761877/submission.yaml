comment: We present the first measurements of the pseudorapidity distribution of primary charged particles in Cu+Cu collisions as a function of collision centrality and energy, $\sqrt{s_{NN}}$ = 22.4, 62.4 and 200 GeV, over a wide range of pseudorapidity, using the PHOBOS detector. Making a global comparison of Cu+Cu and Au+Au results, we find that the total number of produced charged particles and the rough shape (height and width) of the pseudorapidity distributions are determined by the number of nucleon participants. More detailed studies reveal that a more precise matching of the shape of the Cu+Cu and Au+Au pseudorapidity distributions over the full range of pseudorapidity occurs for the same $N_{part}$/2A value rather than the same $N_{part}$ value. In other words, it is the collision geometry rather than just the number of nucleon participants that drives the detailed shape of the pseudorapidity distribution and its centrality dependence at RHIC energies.
